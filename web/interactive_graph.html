<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ego Network Interactive View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <link rel="stylesheet" href="interactive_graph.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <h1>Twitter Ego-Networks</h1>
      <label for="egoId">Ego ID</label>
      <input id="egoId" aria-label="Selecionar ou digitar ego ID" autocomplete="off">
      <label for="tipo">Tipo</label>
      <select id="tipo">
        <option value="edges">Follows</option>
        <option value="feats">Common Feats</option>
      </select>
      <button id="loadBtn" type="button">Carregar</button>
      <div class="status" id="status">Aguardando...</div>
    </div>

    <div id="cy"></div>
    <div id="panelSplitter" class="panel-splitter" role="separator" aria-orientation="vertical" aria-label="Redimensionar painel"></div>

    <aside class="side">
      <section class="panel-section is-collapsed" id="summarySection">
        <button
          type="button"
          class="section-toggle"
          id="summaryToggle"
          aria-expanded="false"
          aria-controls="graphSummaryWrapper"
        >
          Resumo do grafo
          <span class="section-chevron" aria-hidden="true">▾</span>
        </button>
        <div class="section-content" id="graphSummaryWrapper">
          <div id="graphSummary">Carregue um grafo para ver as estatísticas.</div>
        </div>
      </section>

      <section class="panel-section is-collapsed" id="detailsSection">
        <button
          type="button"
          class="section-toggle"
          id="detailsToggle"
          aria-expanded="false"
          aria-controls="nodeDetailsWrapper"
        >
          Detalhes do nó
          <span class="section-chevron" aria-hidden="true">▾</span>
        </button>
        <div class="section-content" id="nodeDetailsWrapper">
          <div id="nodeDetails">Clique em um nó para ver os detalhes.</div>
        </div>
      </section>

      <section class="panel-section is-collapsed" id="advancedSection">
        <button
          type="button"
          class="section-toggle"
          id="advancedToggle"
          aria-expanded="false"
          aria-controls="advancedStatsWrapper"
        >
          Estatísticas avançadas
          <span class="section-chevron" aria-hidden="true">▾</span>
        </button>
        <div class="section-content" id="advancedStatsWrapper">
          <div id="advancedStats">Carregue um grafo para ver as estatísticas avançadas.</div>
        </div>
      </section>
    </aside>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script type="module" src="interactive_graph.js"></script>
</body>
</html>
